name: Security Scan

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to scan'
        required: false
        default: 'latest'
  workflow_run:
    workflows: ["build-backend-image"]
    types: [completed]

jobs:
  scan:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
    env:
      IMAGE_TAG: ${{ inputs.image_tag || 'latest' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack (Yarn 4.12.0)
        run: npm i -g corepack && corepack enable && corepack prepare yarn@4.12.0 --activate

      - name: Install trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Resolve image tag from publish
        if: github.event_name == 'workflow_run'
        run: |
          VERSION=$(grep '"version"' package.json | sed 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/')
          echo "IMAGE_TAG=$VERSION" >> "$GITHUB_ENV"

      - name: Read prompt file
        id: read-prompt
        run: |
          {
            echo 'PROMPT<<EOF'
            cat .github/prompts/security-scan.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run security agent
        uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ steps.read-prompt.outputs.PROMPT }}
          claude_args: "--model claude-sonnet-4-6 --allowedTools Bash,Read,Edit,Write,Glob,Grep"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
